url: https://r-datey.logmu.org/
authors:
  Tim Gordon:
    href: http://timgord.com
template:
  bootstrap: 5
  light-switch: yes
  math-rendering: katex
  bslib:
    base_font: Lisnoti
    primary: '#7E57C2'
    secondary: '#FF5722'
    navbar-light-bg: hsl(14, 100%, 96%)
    navbar-dark-bg: hsl(14, 100%, 18%)
footer:
  structure:
    left: [developed_by, typeset_in]
    right: built_with
  components:
    typeset_in: '<br>Typeset in <a href="https://lisnoti.com/">Lisnoti</a>.'
navbar:
  type: default
  left:
  - icon: fa-home
    href: index.html
    aria-label: Home
  - text: Why datey?
    href: articles/why-datey.html
  - text: Get started
    href: articles/datey.html
  - text: R index
    href: reference/index.html
  - text: Specification
    href: articles/spec.html
  - text: Change log
    href: news/index.html
reference:
- title: Package overview
  contents:
  - datey-package
- title: 'Create a `datey` or `durationy`'
  contents:
  - datey
  - durationy
  - seq
  - combine
  - subset
- title: 'Properties of `datey` and `durationy`'
  contents:
  - datey_components
  - is_type
  - is_xxx_day
  - is_leap_year
- title: Conversion to years
  contents:
  - as_years_datey
  - as_years_durationy
- title: Operators and statistics
  contents:
  - ops
  - mean
  - max_min
- title: '`datey_interval`'
  contents:
  - datey_interval
  - interval_nature
  - interval_properties
  - interval_includes
  - all_of_time
- title: Formatting and printing
  contents:
  - text_from_datey
  - text_from_durationy
