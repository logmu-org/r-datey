# UndefinedBehaviorSanitizer check, reproducing CRAN's clang-UBSAN "additional
# issues" check in CI.
#
# Uses the actively-maintained R-hub v2 clang-ubsan container, which pairs a
# current R-devel with compatible packages (unlike the stale wch1/r-debug
# image, whose old R-devel could not compile the current cpp11):
#   ghcr.io/r-hub/containers/clang-ubsan
# R-hub publishes no standalone gcc-ubsan container, but the CRAN finding was
# one compiler-independent source line flagged identically by clang-UBSAN,
# gcc-UBSAN and M1-SAN, so this single check verifies the fix for all three.
#
# This is a manual, on-demand action: trigger it from the Actions tab
# ("sanitizers" -> "Run workflow"). It does not run on push -- ordinary commit
# CI is handled separately by R-CMD-check.yaml. The job fails if UBSan reports
# a "runtime error:", i.e. undefined behaviour.
#
# Note: a run is slow (datey is compiled under the sanitizer and its tests run
# under it), several minutes.

name: sanitizers

on:
  # Manual, on-demand only: trigger from the Actions tab -> "Run workflow".
  workflow_dispatch:

permissions: read-all

jobs:
  sanitize:
    runs-on: ubuntu-latest
    name: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        image: [clang-ubsan]
    container:
      image: ghcr.io/r-hub/containers/${{ matrix.image }}
    env:
      UBSAN_OPTIONS: print_stacktrace=1
      # knitr/rmarkdown aren't installed here (vignettes are skipped), so don't
      # let missing Suggests turn into a check error.
      _R_CHECK_FORCE_SUGGESTS_: false
    steps:
      - uses: actions/checkout@v4

      - name: Install build/test dependencies
        # Use pak, which the r-hub containers ship and which fetches correctly
        # from the container's binary repository (built for this R + libc++).
        # Plain install.packages() resolves versions but cannot download from
        # that repo. pak errors on failure, so the step fails loudly by itself.
        run: R -q -e 'pak::pkg_install(c("cpp11", "testthat", "pillar"))'

      - name: Build source tarball
        run: R CMD build . --no-build-vignettes

      - name: Check under sanitizer
        run: R CMD check --no-manual --ignore-vignettes datey_*.tar.gz

      - name: Show R CMD check logs on failure
        if: failure()
        run: |
          for f in datey.Rcheck/00install.out datey.Rcheck/00check.log \
                   datey.Rcheck/tests/testthat.Rout datey.Rcheck/tests/testthat.Rout.fail; do
            echo "===================== $f ====================="
            cat "$f" 2>/dev/null || echo "(not present)"
          done

      - name: Fail if UBSan reported undefined behaviour
        run: |
          if grep -RIn "runtime error:" datey.Rcheck/ ; then
            echo "::error::UndefinedBehaviorSanitizer reported undefined behaviour (see matches above)."
            exit 1
          fi
          echo "CLEAN: no UBSan 'runtime error:' diagnostics found."

      - name: Upload check directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: datey.Rcheck-${{ matrix.image }}
          path: datey.Rcheck/
